name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (core + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint
        run: ruff check src tests

      - name: Unit tests
        run: pytest -q

      - name: Offline demo (integration test, must finish fast with no API key)
        run: |
          robovid_conditioner demo --out ci_demo_out --episodes 3
          test -f ci_demo_out/annotations.parquet
          # Assert the sidecar has all three record types.
          python - <<'PY'
          from robovid_conditioner.schema import read_annotations
          df = read_annotations("ci_demo_out")
          types = set(df["record_type"])
          assert types == {"episode_metadata", "subtask", "subgoal"}, types
          assert df["episode_id"].nunique() == 3
          print("offline demo integration test OK:", len(df), "rows")
          PY

      - name: Forbidden-path / secret audit
        run: |
          # Patterns are assembled from fragments so this workflow does not itself
          # contain the literal strings it forbids.
          win=$(printf '%s' 'C' ':' '\\' 'Users')
          drv=$(printf '%s' 'D' ':' '\\')
          snap=$(printf '%s' 'snap' '_' '20')
          if git grep -nIE "${win}|${drv}|${snap}[0-9][0-9]" -- . ; then
            echo "Found forbidden machine-specific paths or snapshot ids"; exit 1
          fi
          echo "audit clean"
