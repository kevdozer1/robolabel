# robolabel default rubric.
#
# This is the single source of truth for prompts, score definitions, and gate
# thresholds. It was tuned on tabletop pick-and-place teleoperation (the BridgeData
# V2 / SO-10x family). To adapt it to a new task family, copy this file, edit the
# prompts and the quality scale, and pass `--rubric your_rubric.yaml`. Nothing
# scoring-related is hardcoded in the Python.

schema_version: robolabel/rubric/v1
name: tabletop_pick_and_place
description: >
  Pi0.7-style conditioning annotations for short tabletop manipulation episodes:
  2-5 temporally-ordered subtasks, an episode quality/mistake judgment, and a
  subgoal keyframe per subtask.

# Number of evenly-spaced keyframes sampled into the contact sheet per VLM call.
keyframes: 6

subtasks:
  min_segments: 2
  max_segments: 5
  # Stage one: elicit only physical evidence, no labels yet.
  observe_prompt: |
    You are observing a robot manipulation episode before assigning labels.
    Task: {task}
    The episode has frames 0 through {last_frame}; the contact sheet shows
    evenly-spaced keyframes with their frame numbers.
    Describe ONLY physical evidence: visible objects, gripper open/closed state,
    arm motion, and likely contact or release moments. Do not decide subtask
    labels yet.
    Return ONLY valid JSON:
    {"observations":[{"objects":["object","destination"],"gripper":"evidence","motion":"evidence","summary":"physical observation"}],"episode_summary":"one physical summary"}
  # Stage two: produce the ordered subtasks, grounded in the observations.
  label_prompt: |
    Segment this robot manipulation episode into {min_segments} to {max_segments}
    temporally-ordered subtasks.
    Task: {task}
    The episode has frames 0 through {last_frame}.
    Stage-one physical observations:
    {observations}
    Each subtask needs start_step, end_step (frame indices in [0,{last_frame}],
    contiguous and non-overlapping, covering the whole episode), and a short
    subtask_text naming the visible action and the object/destination when possible
    (e.g. "grasp the red block", "place block in bowl").
    Do not repeat the same subtask_text. Do not use removal/reversal language
    unless the task itself asks for removal.
    Return ONLY valid JSON:
    {"segments":[{"segment_idx":0,"start_step":0,"end_step":3,"subtask_text":"short action phrase"}]}

metadata:
  # Quality is a 1-5 curation/training-usefulness score. Edit these definitions
  # for your task family; the VLM is shown them verbatim.
  quality_scale:
    "1": "No useful target interaction is visible; not usable training data."
    "2": "Weak or ambiguous interaction; wrong object or major failure."
    "3": "Partial interaction; the manipulation cycle is incomplete or unclear."
    "4": "Clear approach/grasp/transport/release boundaries; usable even if the final placement is imperfect."
    "5": "Clean, unambiguous successful manipulation with clear boundaries."
  observe_prompt: |
    You are observing a robot demonstration before rating it.
    Task: {task}
    Episode length: {num_frames} frames.
    Describe physical evidence only: visible objects, approach, grasp/contact,
    transport, release/state-change, whether the requested task appears completed,
    and any visible mistake.
    Return ONLY valid JSON:
    {"objects":["object","destination"],"boundary_evidence":"...","completion_evidence":"...","mistake_evidence":"...","summary":"..."}
  label_prompt: |
    Rate this robot demonstration from the keyframes and the task instruction.
    Task: {task}
    Episode length: {num_frames} frames.
    Quality scale (1-5):
    {quality_scale}
    Physical observations:
    {observations}
    task_success_quality measures whether the requested task was completed.
    curation_quality measures training usefulness (visible approach/grasp/contact/
    transport/release boundaries). They can differ. Set mistake=true for a clear
    wrong object, failed grasp, wrong destination, or unfinished task.
    Return ONLY valid JSON:
    {"task_success_quality":3,"curation_quality":4,"mistake":false,"boundary_clarity":"clear","reason":"specific evidence consistent with both scores"}

subgoals:
  # Where the subgoal keyframe for each subtask comes from. "subtask_end" uses the
  # last frame of each subtask segment (the achieved sub-state).
  source: subtask_end

# ---------------------------------------------------------------------------- #
# Annotation strategies (the boundary-quality layer).
#
# These prompts drive the grounded segmentation strategies (S1+). The strategy
# *presets* (frame count, refinement, self-consistency) live in strategy.py; the
# language the model sees lives here so it stays config, not code. Baseline S0
# does not use this section at all — it uses `subtasks.*` above, unchanged.
# ---------------------------------------------------------------------------- #
strategies:
  # Closed phase vocabulary for tabletop pick-and-place. The grounded label call
  # must assign each segment one of these; anything else is coerced to "other".
  phase_vocabulary: [approach, grasp, transport, release-place, retract, other]
  # Granularity floor: grounded strategies reject a segmentation with fewer than
  # this many segments (the degenerate "complete the task" single-segment output).
  min_segments: 3
  max_segments: 6
  # Stage one for grounded segmentation: physical evidence only, no labels.
  grounded_observe_prompt: |
    You are observing a robot manipulation episode before segmenting it.
    Task: {task}
    The contact sheet shows numbered keyframes. Each frame is captioned with its
    exact frame index and timestamp:
    {frame_manifest}
    Describe ONLY physical evidence and name the frame index where each event is
    first visible: object contact, gripper close, lift-off, arrival over the
    destination, release, and retract. Do not assign subtask labels yet.
    Return ONLY valid JSON:
    {"events":[{"frame":12,"evidence":"gripper closes on the brick"}],"objects":["brick","box"]}
  # Stage two: grounded, frame-indexed, closed-vocabulary segmentation.
  grounded_label_prompt: |
    Segment this robot manipulation episode into {min_segments} to {max_segments}
    temporally-ordered subtasks. This is tabletop pick-and-place; a normal episode
    has at least {min_segments} phases, NOT a single "complete the task" segment.
    Task: {task}
    The contact sheet frames are captioned with their exact frame index and
    timestamp:
    {frame_manifest}
    Stage-one physical events:
    {observations}
    For each subtask return:
      - "phase": exactly one of {phase_vocabulary}
      - "target": the SPECIFIC object or destination this subtask acts on, named from the
        scene — e.g. "red cube", "blue cube", "the box". When several similar objects are
        present (two cubes, several bricks), you MUST disambiguate which one. Required for
        every phase EXCEPT "retract", where "none" is allowed.
      - "end_frame": the integer frame index (from the captions above) where this
        subtask ends and the next begins — choose the frame where the transition
        is actually visible, not an even division of the episode
      - "evidence": one short clause naming the visible event at that boundary
        (e.g. "gripper contacts the red cube", "red cube released on the blue cube")
      - "subtask_text": a short action phrase naming the object/destination
    Boundaries must be strictly increasing frame indices, contiguous, and cover
    the whole episode (frames 0 through {last_frame}). Do not return a single
    segment. Do not place boundaries at uniform fractions of the duration.
    Return ONLY valid JSON:
    {"segments":[{"phase":"approach","target":"red cube","end_frame":40,"evidence":"gripper above the red cube","subtask_text":"move to the red cube"}]}
  # Open-vocabulary grounded label (S2-open): same grounding + target + min granularity, but
  # the phase is named in FREE TEXT to fit whatever the task actually is (pour, fold, wipe).
  grounded_label_prompt_open: |
    Segment this robot manipulation episode into {min_segments} to {max_segments}
    temporally-ordered subtasks. A normal episode has at least {min_segments} distinct
    phases, NOT a single "complete the task" segment.
    Task: {task}
    The contact sheet frames are captioned with their exact frame index and
    timestamp:
    {frame_manifest}
    Stage-one physical events:
    {observations}
    For each subtask return:
      - "phase": a SHORT free-text name for what the arm is doing in this phase, chosen to
        fit THIS task — 1 to 3 words, verb-led (e.g. "approach cup", "tilt to pour",
        "grasp corner", "fold flap", "wipe surface"). Do NOT force the action into
        a fixed list; name what you actually see.
      - "target": the SPECIFIC object or destination this subtask acts on, named from the
        scene — e.g. "cup", "the bowl", "left sleeve", "near corner". When several similar
        objects are present you MUST disambiguate which one. Use "none" only for a phase that
        genuinely acts on no object.
      - "end_frame": the integer frame index (from the captions above) where this
        subtask ends and the next begins — choose the frame where the transition
        is actually visible, not an even division of the episode
      - "evidence": one short clause naming the visible event at that boundary
        (e.g. "liquid starts leaving the cup", "cloth edge meets the opposite edge")
      - "subtask_text": a short action phrase naming the object/destination
    Do NOT assume any phase exists that you cannot see in the frames. In particular, do NOT
    append a terminal "retract" / "withdraw" / wind-down phase at the end unless the arm
    VISIBLY moves away from the workspace and stops in the final frames — many episodes simply
    end mid- or post-action with no separate retract. Only segment phases actually visible.
    Boundaries must be strictly increasing frame indices, contiguous, and cover
    the whole episode (frames 0 through {last_frame}). Do not return a single
    segment. Do not place boundaries at uniform fractions of the duration.
    Return ONLY valid JSON:
    {"segments":[{"phase":"tilt to pour","target":"the cup","end_frame":40,"evidence":"liquid starts leaving the cup","subtask_text":"pour from the cup"}]}
  # Dense-window refinement (S3): pin one boundary to its exact transition frame.
  refine_prompt: |
    Find the EXACT frame where one subtask transition happens in a robot
    manipulation episode.
    Task: {task}
    The transition is: end of "{phase_before}" -> start of "{phase_after}".
    Visible event at this boundary: {boundary_evidence}
    The contact sheet shows consecutive frames around the candidate boundary, each
    captioned with its exact frame index and timestamp:
    {frame_manifest}
    Return the single integer frame index where the event first becomes true.
    Return ONLY valid JSON:
    {"frame":137}

# Proprioceptive gripper-event baseline (S_grip): a zero-API segmentation derived
# from the robot's own gripper + arm-joint signals, scored alongside the VLM
# strategies as the free baseline. Boundaries come from gripper open/close
# transitions and end-effector-speed pauses; phases are assigned from the closed
# vocabulary by event order.
gripper_baseline:
  gripper_norm_threshold: 0.5     # closed/open split on min-max-normalized gripper.pos
  min_transition_frames: 8        # debounce: ignore gripper flips closer than this
  ee_smooth_window: 5             # frames for moving-average smoothing of EE speed
  ee_pause_window: 40             # look this many frames before a gripper event for the arm pause
  min_segment_frames: 5           # drop boundaries that would make a segment shorter than this

# Deterministic control annotations (robolabel/control.py; no VLM). active_dof marks a segment's
# dof group "moved" when its per-dim range over the segment exceeds this fraction of the dim's
# full-episode range.
control:
  active_dof_threshold: 0.15

# Deterministic speed descriptor (robolabel/speed.py; no VLM). The active window is motion-defined
# (phase-agnostic): action velocity above motion_rel_threshold * the episode's 90th-pct velocity.
speed:
  motion_rel_threshold: 0.12
  motion_smooth: 5

# Population guard for corpus-relative tiers (curation/speed). Tiers are only assigned when at
# least this many episodes (pooled across the corpus) with real spread exist; else left null.
curation:
  min_population: 15

# Proprioception-fused grasp/release snap (robolabel/snap.py; no VLM). Snap a grasp/release-onset
# boundary to the nearest gripper transition within this many frames; no-op if none in-window.
snap:
  window: 8

gate:
  # A collapsed score distribution (e.g. every episode scored 5) is a red flag that
  # the VLM is not discriminating. Flag when distinct quality scores are too few.
  min_distinct_quality_scores: 2
  min_episodes_for_dispersion: 8
  flag_repeated_subtask_text: true
  flag_object_grounding: true
  flag_score_reason_contradiction: true
  # Failure-band detectors (from the SO-101 eval). The gate FLAGS these; it never
  # drops an episode. See the README "What the gate does and does not do".
  flag_degenerate_single_segment: true   # band (a): single "complete the task" segment
  flag_uniform_split: true               # band (b): boundaries at uniform fractions
  # Coefficient of variation (std/mean) of segment lengths below this == near-uniform.
  uniform_split_cv_threshold: 0.12
  min_segments_for_uniform_check: 3
  # Quality-score outlier policy: a score this many points (or more) below the
  # dataset's neighborhood (median) is flagged needs_review, never dropped. This
  # catches hallucinated low scores on good episodes (SO-101 eps 45/46: auto=1).
  flag_quality_outlier: true
  quality_outlier_margin: 2
